services:
  postgres:
    restart: always
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: aggrhub
      POSTGRES_USER: aggrhub
      POSTGRES_PASSWORD: aggrhub
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aggrhub"]
      interval: 5s
      retries: 5

  server:
    restart: always
    build:
      context: .
      dockerfile: ./apps/server/Dockerfile
    environment:
      DATABASE_URL: postgres://aggrhub:aggrhub@postgres:5432/aggrhub
      PORT: 3000
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-}
    depends_on:
      postgres:
        condition: service_healthy

  web:
    restart: always
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
    ports:
      - "80:8080"
    depends_on:
      - server

volumes:
  pgdata:
